experiment_name: relu_128_128_128_normalized_regularized_l2_20_lr_01_10k
data_loading:
  training_path: data/train.csv
  testing_path: data/test.csv
  label_column: label
preprocessing:
  normalize_pixels: true
  pixel_scale_value: 255.0
data_splitting:
  enabled: true
  strategy: stratified
  validation_size: 0.2
  random_seed: 42
model:
  name: multi_layer_relu_classifier
  input_size: 784
  neurons_profile:
  - 128
  - 128
  - 128
  - 10
training:
  optimizer: batch_gradient_descent
  learning_rate: 0.1
  initialization_random_seed: 42
  num_iterations: 10000
  batching:
    strategy: full_batch
    batch_size: null
    shuffle: false
    random_seed: 42
  regularization:
    enabled: true
    type: l2
    lambda: 20
outputs:
  prediction_preview_size: 20
  save_summary: true
