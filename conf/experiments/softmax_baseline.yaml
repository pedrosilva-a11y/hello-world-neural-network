experiment_name: softmax_baseline

data_loading:
  training_path: data/train.csv
  testing_path: data/test.csv
  label_column: label

preprocessing:
  normalize_pixels: false
  pixel_scale_value: 255.0

data_splitting:
  enabled: true
  strategy: stratified
  validation_size: 0.2
  random_seed: 42

model:
  name: single_layer_softmax_classifier
  input_size: 784
  output_size: 10

training:
  optimizer: batch_gradient_descent
  num_iterations: 10000
  learning_rate: 0.00001

outputs:
  prediction_preview_size: 20
  save_summary: true